# https://taskfile.dev

version: '3'
silent: true
tasks:
  shortcuts:
    desc: Show shortcuts for mac
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        echo '
        screen recording   = shift - cmd - 5
        screenshot full    = shift - cmd - 3
        screenshot partial = shift - cmd - 4
        '

  docker:
    desc: Start docker
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        open -n "/Applications/Docker.app"

  rancher:
    desc: Start rancher
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        open -n "/Application/Rancher Desktop.app"

  change-node-version:
    desc: Change node version (`task change-node-version -- 22`)
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        nvm install {{.CLI_ARGS}}
        nvm use {{.CLI_ARGS}}

  brew-install:
    desc: Install missing packages from ~/.Brewfile
    cmds:
      - brew bundle install --file=~/.Brewfile

  brew-dump:
    desc: Dump installed packages to ~/.Brewfile
    cmds:
      - brew bundle dump --file=~/.Brewfile --force --no-flatpak --no-npm --no-go --no-cargo --no-uv --no-krew --no-vscode --no-mas --no-winget

  update:
    desc: Update all packages
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        # omz update # Doesn't work, as it's a function, not an application
        brew update
        brew upgrade
        brew cleanup
        softwareupdate --install --all

  update-system:
    desc: Update system
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        sudo softwareupdate --install --all --restart

  netspeed:
    desc: Show current network speed
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        networkQuality

  git-show-origin:
    desc: Show origin of current git repo
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        git ls-remote --get-url

  flush-dns:
    desc: Flush DNS on macOS
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        sudo dscacheutil -flushcache
        sudo killall -HUP mDNSResponder

  renew-dhcp:
    desc: Renew DHCP on macOS
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        sudo ipconfig set en0 BOOTP
        sudo ipconfig set en0 DHCP

  whatsmyip:
    desc: Show current public ip (v4 & v6)
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        dig @ns.sslip.io txt ip.sslip.io +short -4 | tr -d '"' # forces IPv4 lookup
        dig @ns.sslip.io txt ip.sslip.io +short -6 | tr -d '"' # forces IPv6 lookup

  create-nvmrc:
    desc: Create nvmrc file for current node version
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        node -v > .nvmrc

  git-pull-all:
    desc: Pull updates for all git repos in the current folder
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        for dir in {{.USER_WORKING_DIR}}/*/; do
          if [ -d "$dir/.git" ]; then
            if ! git -C "$dir" diff --quiet || ! git -C "$dir" diff --cached --quiet; then
              echo "⚠ Skipping $dir (uncommitted changes)"
            else
              if ! git -C "$dir" ls-remote --exit-code origin &>/dev/null; then
                echo "⚠ Skipping $dir (remote no longer exists)"
              else
                echo "↓ Pulling $dir"
                git -C "$dir" pull --ff-only || echo "✗ Failed to pull $dir"
                git -C "$dir" fetch --prune
                git -C "$dir" branch --merged HEAD | grep -v '^\*\|main\|master\|develop' | xargs -r git -C "$dir" branch -d
              fi
            fi
          fi
        done

  clean:
    desc: Remove temporary/reproducible dirs from all subfolders of a path (`task clean -- ~/code`). Pass DRY=1 to preview. Use `ncdu <path>` to discover new patterns.
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      TARGET: '{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{.USER_WORKING_DIR}}{{end}}'
    cmds:
      - |
        PATTERNS=(
          node_modules
          .terraform
          cdk.out
        )
        echo "{{if .DRY}}[dry run] Would clean{{else}}Cleaning{{end}} in: {{.TARGET}}"
        for pattern in "${PATTERNS[@]}"; do
          if [ -n "{{.DRY}}" ]; then
            find "{{.TARGET}}" -type d -name "$pattern" -prune -print
          else
            find "{{.TARGET}}" -type d -name "$pattern" -prune -print0 | xargs -0 rm -rf
          fi
        done

  zsh:
    desc: List functions defined in ~/.zshrc
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        grep -E '^[a-zA-Z_-][a-zA-Z0-9_-]*\(\)' ~/.zshrc | sed 's/() {.*//'

  ncdu:
    desc: Interactive disk usage analyzer (`task ncdu -- <path>`, defaults to ~)
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        ncdu {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}~{{end}}

  btop:
    desc: Interactive resource monitor (CPU, memory, processes, network, disk)
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        btop

  portscan:
    desc: Full TCP port scan of a target (`task portscan -- <host|ip>`)
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        nmap -sT -T4 -vv -p- {{.CLI_ARGS}}

  ip:
    desc: Show local IPs, public IP, and open ports
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - |
        echo "=== Local IPs ==="
        ifconfig | grep -E "^[[:space:]]+inet6? " | grep -v "127.0.0.1\|::1\|fe80::" | awk '{print $2}'
        echo ""
        echo "=== Public IP ==="
        dig @ns.sslip.io txt ip.sslip.io +short -4 | tr -d '"'
        dig @ns.sslip.io txt ip.sslip.io +short -6 | tr -d '"'
        echo ""
        echo "=== Open Ports ==="
        { echo "ADDRESS PROCESS PID"; lsof -iTCP -sTCP:LISTEN -P -n | awk 'NR>1 {print $9, $1, $2}' | sort -t: -k2 -n; } | column -t

  backup:
    desc: Backup home dir
    cmds:
      - |
        TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)
        ssh -i ~/.ssh/id_backup-macbook-superluminar backup-macbook-superluminar@blackhole.local "mkdir -p /mnt/cold/backup-macbook-superluminar/$TIMESTAMP/"
        rsync -chaxP --info=progress2 \
          -e "ssh -i ~/.ssh/id_backup-macbook-superluminar" \
          --exclude=.cache/ \
          --exclude=.cursor/ \
          --exclude=.kube/cache/ \
          --exclude=.pulumi/plugins/ \
          --exclude=.vscode/extensions/ \
          --exclude=.npm/ \
          --exclude=.nvm/ \
          --exclude=.rd/ \
          --exclude=Library/ \
          --exclude=Pictures/ \
          --exclude=go/ \
          /Users/$(whoami)/ \
          backup-macbook-superluminar@blackhole.local:/mnt/cold/backup-macbook-superluminar/$TIMESTAMP/

  pull-file:
    desc: Pull a specific file from upstream without touching other uncommitted changes (`task pull-file -- .zshrc`)
    cmds:
      - git -C "$HOME" fetch origin
      - git -C "$HOME" checkout origin/main -- {{.CLI_ARGS}}

  local-claude:
    desc: Start claude with local ai
    cmds:
      - ollama launch claude --model qwen2.5-coder:7b
